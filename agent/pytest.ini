[pytest]
markers =
    slow: marks tests that require a live LLM model (deselect with -m "not slow")
    endpoint: marks tests that spin up a FastAPI TestClient or hit real HTTP routes (excluded from fast CI run)
    e2e_ui: Playwright browser tests against live uvicorn (requires requirements-e2e.txt)
    browser_smoke: Playwright Chromium launch + navigation (deselect in PR CI; needs playwright install chromium)
    voice_smoke: STT/TTS micro calls (deselect in PR CI; may download models)
    gpu_smoke: GPU GGUF load (deselect in PR CI; requires LAYLA_GPU_SMOKE and LAYLA_GPU_SMOKE_GGUF)
# --strict-markers: a typo'd or undeclared @pytest.mark.X is now a hard error, not a
# silent no-op — so the CI `-m "not slow and not endpoint …"` expression can't quietly
# stop filtering. This is the canonical config (CI runs from agent/, so this wins).
addopts = --strict-markers
timeout = 120
