name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # The pushed tag MUST match agent/version.py, or the installer ships mislabeled and every
      # client's auto-updater compares the release tag to a stale __version__ and re-downloads
      # forever. This guard makes that drift a failed release instead of a shipped one.
      - name: Verify tag matches version.py
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c 'import sys; sys.path.insert(0,"agent"); from version import __version__; print(__version__)')"
          echo "tag=$tag  version.py=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::release tag v$tag does not match agent/version.py ($ver). Bump version.py before tagging."
            exit 1
          fi

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build installer payload + compile Inno
        shell: pwsh
        run: |
          ./installer/build_installer.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: layla-windows-installer
          path: |
            installer/output/*.exe
            installer/output/SHA256SUMS.txt

  publish-release:
    needs: build-windows-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - name: Download built installer
        uses: actions/download-artifact@v4
        with:
          name: layla-windows-installer
          path: dist-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag name (v*) drives the release; body pulls the matching CHANGELOG section
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist-release/*.exe
            dist-release/SHA256SUMS.txt
      # NOTE: Linux/macOS ship via the source installers (install.sh) — see INSTALL.md.
      # A packaged Linux/macOS build is a future addition; the Windows installer + the
      # cross-platform install.sh cover the supported install paths today.

