name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * *"   # nightly — heavy real-model jobs (benchmark, golden eval)
  workflow_dispatch: {}

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          # Pre-install the prebuilt CPU llama-cpp wheel so requirements.txt doesn't
          # compile it from source on every unit run (minutes; needs a C toolchain).
          pip install "llama-cpp-python>=0.3.1,<0.4" \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu \
            --only-binary llama-cpp-python --prefer-binary
          pip install -r requirements.txt

      - name: Verify editable install (fabrication_assist + layla packages)
        run: |
          pip install -e .
          python -c "import fabrication_assist; import layla"

      - name: License compliance — no strong-copyleft deps (REQ-02)
        run: python scripts/check_copyleft.py

      - name: Dependency vulnerability audit (pip-audit)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --skip-editable --progress-spinner off || echo "::warning::pip-audit reported advisories (non-blocking; review)"

      - name: Check UI onclick/onchange symbols
        working-directory: agent
        run: python scripts/check_ui_symbols.py

      - name: Daily-driver smoke (targeted pytest)
        working-directory: agent
        run: python -m pytest tests/test_edit_loop_tools.py -q --tb=line --timeout=60

      - name: Write CI runtime config
        working-directory: agent
        run: |
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 2,
            "max_runtime_seconds": 30,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false,
            "embedding_cache_warmup_enabled": false,
            "embedder_prewarm_enabled": false,
            "llm_prewarm_enabled": false
          }
          EOF

      - name: Run tests with coverage floor
        working-directory: agent
        run: pytest tests/ -v --tb=short -m "not slow and not e2e_ui and not browser_smoke and not voice_smoke and not gpu_smoke and not endpoint" --timeout=60 --cov=. --cov-config=.coveragerc --cov-report=term-missing:skip-covered

  test-windows:
    name: Test (Windows, Python 3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install "llama-cpp-python>=0.3.1,<0.4" --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu --only-binary llama-cpp-python --prefer-binary
          pip install -r requirements.txt

      - name: Verify editable install (fabrication_assist + layla packages)
        run: |
          pip install -e .
          python -c "import fabrication_assist; import layla"

      - name: License compliance — no strong-copyleft deps (REQ-02)
        run: python scripts/check_copyleft.py

      - name: Check UI onclick/onchange symbols
        working-directory: agent
        run: python scripts/check_ui_symbols.py

      - name: Daily-driver smoke (targeted pytest)
        working-directory: agent
        run: python -m pytest tests/test_edit_loop_tools.py -q --tb=line --timeout=120

      - name: Write CI runtime config
        working-directory: agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP/layla-ci" | Out-Null
          $sand = (($env:RUNNER_TEMP -replace '\\', '/') + '/layla-ci')
          $obj = @{
            model_filename = 'ci-stub.gguf'
            use_chroma = $false
            sandbox_root = $sand
            max_tool_calls = 2
            max_runtime_seconds = 30
            n_ctx = 2048
            n_gpu_layers = 0
            scheduler_study_enabled = $false
            embedding_cache_warmup_enabled = $false
            embedder_prewarm_enabled = $false
            llm_prewarm_enabled = $false
          }
          $obj | ConvertTo-Json -Compress | Set-Content -Encoding utf8 runtime_config.json

      - name: Run tests (no coverage floor)
        working-directory: agent
        run: python -m pytest tests/ -v --tb=short -m "not slow and not e2e_ui and not browser_smoke and not voice_smoke and not gpu_smoke and not endpoint" --timeout=120

  e2e-ui:
    name: E2E UI (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Install Playwright Chromium
        working-directory: agent
        run: python -m playwright install chromium --with-deps

      - name: Write CI runtime config
        working-directory: agent
        run: |
          mkdir -p /tmp/layla-ci
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 2,
            "max_runtime_seconds": 30,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false,
            "embedding_cache_warmup_enabled": false,
            "embedder_prewarm_enabled": false,
            "llm_prewarm_enabled": false
          }
          EOF

      - name: Run Playwright UI tests
        working-directory: agent
        run: pytest tests/e2e_ui/ -v --tb=short -m e2e_ui --timeout=120

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check with ruff
        run: python -m ruff check agent fabrication_assist

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the scan sees prior commits
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  package-build:
    name: Package build (wheel + sdist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Packaging validation. NOTE ON DISTRIBUTION MODEL: Layla is distributed from the
      # SOURCE TREE via the installers (install.sh / fresh_install.ps1 / the Windows .exe),
      # NOT via `pip install layla`. The app runs with agent/ on sys.path, so the top-level
      # app modules (main.py, orchestrator.py, ...) and UI assets are intentionally source-
      # only and are not in the wheel. This job therefore validates the packaging CONFIG
      # (pyproject builds a clean wheel+sdist, metadata is valid) and that the importable
      # LIBRARY namespace (layla/, services/, routers/, ...) is actually present in the
      # wheel — catching a packages.find/metadata regression an editable install would hide.
      - name: Build & validate distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          # Assert the wheel actually contains the library packages (not an empty/partial wheel).
          python - <<'PY'
          import glob, zipfile, sys
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          required = ["layla/", "services/", "routers/", "capabilities/", "install/", "skills/"]
          missing = [r for r in required if not any(n.startswith(r) for n in names)]
          if missing:
              print(f"::error::wheel is missing library packages: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"wheel OK: {len(names)} files, library packages present: {', '.join(required)}")
          PY

  inference-smoke:
    name: Inference smoke (real tiny model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install llama-cpp (CPU wheel) + deps
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install "llama-cpp-python>=0.3.1,<0.4" \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu \
            --only-binary llama-cpp-python --prefer-binary
          pip install -r requirements.txt

      - name: Download a tiny real model
        run: |
          mkdir -p models
          python - <<'PY'
          import json, sys
          from pathlib import Path
          sys.path.insert(0, "agent")
          from install.model_downloader import download_model
          d = json.load(open("agent/models/model_catalog.json"))
          m = next(x for x in d["models"] if x.get("name") == "smolLM2-360M-Q2_K")
          r = download_model(m, models_dir=Path("models"), progress=False)
          assert r.get("ok"), r
          print("downloaded:", r.get("filename"))
          PY

      - name: Real inference smoke (run_completion completes one turn)
        working-directory: agent
        env:
          LAYLA_TEST_REAL_LLM: "1"
        run: python -m pytest tests/test_inference_smoke.py -v --tb=short --timeout=300

  coding-benchmark:
    name: Coding pass@1 (real model, nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install llama-cpp (CPU wheel) + deps
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install "llama-cpp-python>=0.3.1,<0.4" \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu \
            --only-binary llama-cpp-python --prefer-binary
          pip install -r requirements.txt
      - name: Download the coding model (3B — pinned by exact catalog name)
        run: |
          mkdir -p models
          python - <<'PY'
          import json, sys
          from pathlib import Path
          sys.path.insert(0, "agent")
          from install.model_downloader import download_model
          d = json.load(open("agent/models/model_catalog.json"))
          m = next(x for x in d["models"] if x.get("name") == "qwen2.5-coder-3b-instruct-Q4_K_M")
          r = download_model(m, models_dir=Path("models"), progress=False)
          assert r.get("ok"), r
          # hard-fail on filename drift instead of letting the test skip silently
          assert (Path("models") / r["filename"]).exists(), r["filename"]
          print("downloaded:", r["filename"])
          PY
      - name: Live pass@1 regression (floor guard)
        working-directory: agent
        env:
          LAYLA_TEST_REAL_LLM: "1"   # opt out of the conftest _block_llama_cpp_on_ci guard — this job WANTS the real model
          LAYLA_BENCH_MODEL: ../models/Qwen2.5-Coder-3B-Instruct-Q4_K_M.gguf
          LAYLA_BENCH_FLOOR: "0.6"
        run: |
          # Guard: the benchmark test skips when the model is absent — fail loud instead.
          test -f "$LAYLA_BENCH_MODEL" || { echo "bench model missing: $LAYLA_BENCH_MODEL"; exit 1; }
          python -m pytest tests/test_benchmark_coding_model.py -v --tb=short --timeout=1200

  golden-eval:
    name: Golden-set eval (real model, nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install llama-cpp (CPU wheel) + deps
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install "llama-cpp-python>=0.3.1,<0.4" \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu \
            --only-binary llama-cpp-python --prefer-binary
          pip install -r requirements.txt
      - name: Download a small model
        run: |
          mkdir -p models
          python - <<'PY'
          import json, sys
          from pathlib import Path
          sys.path.insert(0, "agent")
          from install.model_downloader import download_model
          d = json.load(open("agent/models/model_catalog.json"))
          # Q4_K_M, not Q2_K: same 360M size (CI-fast) but far more coherent. Q2 is so
          # degraded it floods leaks/tool-loops and can't clear a meaningful floor.
          m = next(x for x in d["models"] if x.get("name") == "smolLM2-360M-Q4_K_M")
          r = download_model(m, models_dir=Path("models"), progress=False)
          assert r.get("ok"), r
          print("downloaded:", r.get("filename"))
          PY
      - name: Start Layla + run golden set (with a real pass-rate floor)
        working-directory: agent
        run: |
          cat > runtime_config.json << 'EOF'
          { "model_filename": "SmolLM2-360M-Instruct-Q4_K_M.gguf", "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci", "max_tool_calls": 3, "max_runtime_seconds": 60,
            "n_ctx": 2048, "n_gpu_layers": 0, "scheduler_study_enabled": false,
            "embedder_prewarm_enabled": false }
          EOF
          mkdir -p /tmp/layla-ci
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/layla-server.log 2>&1 &
          SERVER_PID=$!
          # Readiness loop that FAILS if the server never becomes healthy (C2 fix).
          ready=""
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then ready=1; break; fi
            sleep 2
          done
          if [ -z "$ready" ]; then echo "server never became healthy:"; cat /tmp/layla-server.log; kill $SERVER_PID 2>/dev/null || true; exit 1; fi
          # run_golden.py is a report (always exit 0) — capture the pass-rate and gate on a floor.
          python eval/run_golden.py --base-url http://127.0.0.1:8000 --model layla | tee /tmp/golden.out
          kill $SERVER_PID 2>/dev/null || true
          rate=$(grep -oiE 'passed \(([0-9]+)%\)' /tmp/golden.out | grep -oE '[0-9]+' | tail -1)
          echo "golden pass-rate: ${rate:-0}%"
          # Floor = 20%. This job is a PIPELINE-LIVENESS smoke on a tiny 360M model, not a
          # quality bar — the real model-quality gate is the coding-benchmark job (3B,
          # pass@1 >= 0.6). A 360M model is inherently noisy (±1–2 tasks of variance), so
          # the floor is set below its healthy range (~27–35% observed) with margin, while
          # still catching gross regressions: server down (0%), everything refused/leaked/
          # tool-looped (<15%). Raise this only if the golden model is upgraded.
          test "${rate:-0}" -ge 20 || { echo "golden pass-rate ${rate:-0}% below floor 20%"; exit 1; }
