name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write CI runtime config
        working-directory: agent
        run: |
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 5,
            "max_runtime_seconds": 20,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false
          }
          EOF

      - name: Run tests
        working-directory: agent
        run: pytest tests/ -v --tb=short -m "not slow" --timeout=60

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check with ruff
        run: ruff check agent/ --select E,F,W --ignore E501
