name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify editable install (fabrication_assist + layla packages)
        run: |
          pip install -e .
          python -c "import fabrication_assist; import layla"

      - name: Check UI onclick/onchange symbols
        working-directory: agent
        run: python scripts/check_ui_symbols.py

      - name: Daily-driver smoke (targeted pytest)
        working-directory: agent
        run: python -m pytest tests/test_edit_loop_tools.py tests/test_autonomous_v2.py -q --tb=line --timeout=60

      - name: Write CI runtime config
        working-directory: agent
        run: |
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 2,
            "max_runtime_seconds": 30,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false
          }
          EOF

      - name: Run tests with coverage floor
        working-directory: agent
        run: pytest tests/ -v --tb=short -m "not slow and not e2e_ui and not browser_smoke and not voice_smoke and not gpu_smoke" --timeout=60 --cov=. --cov-config=.coveragerc --cov-report=term-missing:skip-covered

  test-windows:
    name: Test (Windows, Python 3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify editable install (fabrication_assist + layla packages)
        run: |
          pip install -e .
          python -c "import fabrication_assist; import layla"

      - name: Check UI onclick/onchange symbols
        working-directory: agent
        run: python scripts/check_ui_symbols.py

      - name: Daily-driver smoke (targeted pytest)
        working-directory: agent
        run: python -m pytest tests/test_edit_loop_tools.py tests/test_autonomous_v2.py -q --tb=line --timeout=120

      - name: Write CI runtime config
        working-directory: agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP/layla-ci" | Out-Null
          $sand = (($env:RUNNER_TEMP -replace '\\', '/') + '/layla-ci')
          $obj = @{
            model_filename = 'ci-stub.gguf'
            use_chroma = $false
            sandbox_root = $sand
            max_tool_calls = 2
            max_runtime_seconds = 30
            n_ctx = 2048
            n_gpu_layers = 0
            scheduler_study_enabled = $false
          }
          $obj | ConvertTo-Json -Compress | Set-Content -Encoding utf8 runtime_config.json

      - name: Run tests (no coverage floor)
        working-directory: agent
        run: python -m pytest tests/ -v --tb=short -m "not slow and not e2e_ui and not browser_smoke and not voice_smoke and not gpu_smoke" --timeout=120

  e2e-ui:
    name: E2E UI (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Install Playwright Chromium
        working-directory: agent
        run: python -m playwright install chromium --with-deps

      - name: Write CI runtime config
        working-directory: agent
        run: |
          mkdir -p /tmp/layla-ci
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 2,
            "max_runtime_seconds": 30,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false
          }
          EOF

      - name: Run Playwright UI tests
        working-directory: agent
        run: pytest tests/e2e_ui/ -v --tb=short -m e2e_ui --timeout=120

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check with ruff
        run: python -m ruff check agent fabrication_assist
