# Nightly / manual deep verification (optional subsystems). PR CI stays fast via marker exclusions.
name: Verify deep

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  e2e-ui:
    name: E2E UI (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt
      - name: Install Playwright Chromium
        working-directory: agent
        run: python -m playwright install chromium --with-deps
      - name: Write CI runtime config
        working-directory: agent
        run: |
          mkdir -p /tmp/layla-ci
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 2,
            "max_runtime_seconds": 30,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false
          }
          EOF
      - name: Run Playwright UI tests
        working-directory: agent
        run: pytest tests/e2e_ui/ -v --tb=short -m e2e_ui --timeout=120

  browser-smoke:
    name: Browser smoke (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt
      - name: Install Playwright Chromium
        working-directory: agent
        run: python -m playwright install chromium --with-deps
      - name: Write CI runtime config
        working-directory: agent
        run: |
          mkdir -p /tmp/layla-ci
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 2,
            "max_runtime_seconds": 30,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false
          }
          EOF
      - name: Run browser_smoke tests
        working-directory: agent
        run: pytest tests/integration_smoke/test_browser_smoke.py -v --tb=short -m browser_smoke --timeout=120

  voice-smoke:
    name: Voice smoke (STT/TTS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write CI runtime config
        working-directory: agent
        run: |
          mkdir -p /tmp/layla-ci
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 2,
            "max_runtime_seconds": 30,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false,
            "whisper_model": "tiny"
          }
          EOF
      - name: Run voice_smoke tests
        working-directory: agent
        run: pytest tests/integration_smoke/test_voice_smoke.py -v --tb=short -m voice_smoke --timeout=600

  doctor-report:
    name: Doctor + capability probe JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Write CI runtime config
        working-directory: agent
        run: |
          mkdir -p /tmp/layla-ci
          cat > runtime_config.json << 'EOF'
          {
            "model_filename": "ci-stub.gguf",
            "use_chroma": false,
            "sandbox_root": "/tmp/layla-ci",
            "max_tool_calls": 2,
            "max_runtime_seconds": 30,
            "n_ctx": 2048,
            "n_gpu_layers": 0,
            "scheduler_study_enabled": false
          }
          EOF
      - name: Generate doctor-report.json
        working-directory: agent
        run: |
          python -c "import json; from services.system_doctor import run_capability_probe, run_diagnostics; d=run_diagnostics(); d['capability_probe']=run_capability_probe(browser_launch=False, voice_micro=False); print(json.dumps(d, indent=2))" > doctor-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: doctor-report
          path: agent/doctor-report.json
